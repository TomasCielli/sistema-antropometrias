<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Albatros Rugby Club — Antropometrías{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('jugadores.listar') }}">
                <img src="{{ url_for('static', filename='img/logo.png') }}"
                     alt="Albatros Rugby Club"
                     height="40"
                     style="object-fit: contain;">
                Albatros Rugby Club
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('jugadores.listar') }}">Jugadores</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('informes.general') }}">Informe General</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('datos.exportar') }}">Exportar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('datos.importar') }}">Importar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="flash-container">
        <div class="container-fluid mt-2">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>
    </div>

    <main class="container-fluid mt-3 mb-5">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
